<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi carrito</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body class="carrito-body">

<div class="carrito-container">

    <h2>🛒 Mi carrito</h2>

    <!-- EJEMPLO DE PRODUCTO -->
    <div class="carrito-item">

        <!-- INFORMACIÓN DEL PRODUCTO -->
        <div class="info">
            <h3>Producto ejemplo</h3>
            <p>$100 MXN</p>

            <!-- CONTROL DE CANTIDAD -->
            <div class="cantidad">
                <button type="button">−</button>
                <span>1</span>
                <button type="button">+</button>
            </div>
        </div>

        <!-- SUBTOTAL Y ELIMINAR -->
        <div class="subtotal">
            <p>$100 MXN</p>
            <button type="button" class="eliminar">❌</button>
        </div>

    </div>

    <!-- TOTAL DEL CARRITO -->
    <div class="carrito-total">
        <h3>Total: <span>$100 MXN</span></h3>
        <button type="button" class="btn-vaciar">Vaciar carrito</button>
    </div>

</div>

</body>
</html>
